<!doctype html>
<html lang="en">
  <head><meta charset="utf-8"><title>Grok model menu evidence</title></head>
  <body>
    <!-- Grok exposes current selection through the trigger label, not aria-checked on menu items. -->
    <button id="model-select-trigger" type="button" aria-label="Model select" aria-haspopup="menu" aria-expanded="true"><span>Fast</span></button>
    <div role="menu">
      <div role="menuitem" data-radix-collection-item aria-disabled="false"><span class="font-semibold">Fast</span><span>Quick responses</span></div>
      <div role="menuitem" data-radix-collection-item aria-disabled="false"><span class="font-semibold">Auto</span><span>Chooses Fast or Expert</span></div>
      <div role="menuitem" data-radix-collection-item aria-disabled="false"><span class="font-semibold">Expert</span><span>Thinks hard</span></div>
      <div role="menuitem" data-radix-collection-item aria-disabled="false"><span class="font-semibold">Heavy</span><span>Team of Experts</span></div>
      <div role="menuitem"><button type="button">Upgrade</button></div>
      <div role="menuitem"><span>Custom Instructions</span></div>
    </div>
  </body>
</html>
