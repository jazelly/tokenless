<!doctype html>
<html lang="en">
  <head><meta charset="utf-8"><title>Claude model-dependent effort evidence</title></head>
  <body>
    <!-- This transient Sonnet state was observed, then the visible session was restored to Haiku. -->
    <button data-testid="model-selector-dropdown" type="button" aria-label="Model: Sonnet 5 Medium" aria-haspopup="menu" aria-expanded="true">Sonnet 5</button>
    <div role="menu">
      <div role="menuitemradio" aria-checked="true"><span>Sonnet 5</span></div>
      <div role="menuitem" aria-haspopup="menu"><span>Effort</span><span>Medium</span></div>
      <div role="menuitem"><span>Thinking</span><button type="button" role="switch" aria-label="Thinking" aria-checked="true"></button></div>
    </div>
    <div role="menu">
      <div role="menuitemradio" aria-checked="false"><span>Low</span></div>
      <div role="menuitemradio" aria-checked="true"><span>Medium</span><span>Default</span></div>
      <div role="menuitemradio" aria-checked="false"><span>High</span></div>
      <div role="menuitemradio" aria-checked="false"><span>Extra</span></div>
      <div role="menuitemradio" aria-checked="false"><span>Max</span></div>
    </div>
  </body>
</html>
