<!--
  Provenance: this redacted, reduced fixture combines the visible composer DOM
  observed at https://grok.com/ and assistant/user message containers observed on
  a public Grok share page on 2026-07-15. The inline behavior script is a
  deterministic Tokenless test shim; it is not provider JavaScript.
-->
<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grok</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        color: #141414;
        background: #fff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      #app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 232px minmax(0, 1fr);
      }

      aside {
        padding: 18px;
        border-right: 1px solid #e5e5e5;
      }

      aside a,
      aside button {
        display: block;
        margin-bottom: 14px;
      }

      main {
        min-width: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        min-height: 62px;
        display: flex;
        align-items: center;
        padding: 10px 24px;
      }

      #conversation {
        width: min(820px, calc(100vw - 300px));
        margin: 0 auto;
        flex: 1;
        padding: 36px 12px 190px;
      }

      [data-testid="user-message"],
      [data-testid="assistant-message"] {
        display: block;
        margin-bottom: 26px;
        line-height: 1.6;
      }

      [data-testid="user-message"] {
        width: fit-content;
        max-width: 78%;
        margin-left: auto;
        padding: 10px 14px;
        border-radius: 18px;
        background: #f1f1f1;
      }

      .response-content-markdown {
        white-space: pre-wrap;
      }

      .composer-shell {
        position: fixed;
        left: 232px;
        right: 0;
        bottom: 0;
        padding: 26px 24px 30px;
        background: linear-gradient(to top, #fff 78%, rgba(255, 255, 255, 0));
      }

      .composer {
        width: min(820px, calc(100vw - 300px));
        min-height: 108px;
        margin: 0 auto;
        padding: 14px;
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) 42px;
        align-items: end;
        gap: 10px;
        border: 1px solid #d4d4d4;
        border-radius: 22px;
        background: #fff;
      }

      [aria-label="Ask Grok anything"] {
        width: 100%;
        min-height: 48px;
        max-height: 150px;
        padding: 10px 4px;
        border: 0;
        outline: none;
        resize: none;
        font: inherit;
        line-height: 1.5;
      }

      .composer button {
        width: 38px;
        height: 38px;
        border: 1px solid #d6d6d6;
        border-radius: 999px;
        background: #f4f4f4;
      }

      .composer button[data-testid="chat-submit"]:not([disabled]) {
        background: #141414;
        color: #fff;
      }

      [data-testid="anon-paywall-sign-up-card"] {
        position: fixed;
        left: 320px;
        top: 90px;
        z-index: 20;
        min-width: 320px;
        padding: 22px;
        border: 1px solid #d4d4d4;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.14);
      }

      [role="menu"][data-fixture="grok-model-menu"] {
        position: fixed;
        right: 78px;
        bottom: 150px;
        z-index: 30;
        min-width: 250px;
        padding: 8px;
        border: 1px solid #d4d4d4;
        border-radius: 16px;
        background: #fff;
      }

      [role="menuitem"][data-radix-collection-item] {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding: 9px 11px;
        border-radius: 10px;
        cursor: pointer;
      }

      [role="menuitem"][aria-disabled="true"] {
        opacity: .45;
        cursor: default;
      }

      [role="menuitem"] .font-semibold {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside>
        <strong>Grok</strong>
        <a href="/">New chat</a>
        <button type="button">Sign in</button>
        <button type="button">Sign up</button>
      </aside>
      <main>
        <header>
          <button
            id="model-select-trigger"
            type="button"
            aria-label="Model select"
            aria-haspopup="menu"
            aria-expanded="false"
          >Fast</button>
        </header>
        <section id="conversation" aria-live="polite">
          <div data-testid="user-message">
            <div class="response-content-markdown markdown">Earlier redacted fixture prompt</div>
          </div>
          <div data-testid="assistant-message">
            <div class="response-content-markdown markdown">
              stale Grok real-DOM fixture answer that must not be read
            </div>
          </div>
        </section>
        <div class="composer-shell">
          <form class="composer" aria-label="Message composer">
            <input type="file" name="files" multiple hidden>
            <button
              type="button"
              data-testid="attach-button"
              aria-label="Attach"
              aria-haspopup="menu"
            >+</button>
            <div
              class="tiptap ProseMirror"
              contenteditable="true"
              role="textbox"
              aria-label="Ask Grok anything"
              aria-multiline="true"
              aria-disabled="false"
              tabindex="0"
              translate="no"
            ></div>
            <button
              type="submit"
              data-testid="chat-submit"
              aria-label="Submit"
              disabled
            >Submit</button>
          </form>
        </div>
      </main>
    </div>
    <script>
      const form = document.querySelector('.composer')
      const submit = document.querySelector('button[data-testid="chat-submit"]')
      const conversation = document.querySelector('#conversation')
      const modelTrigger = document.querySelector('#model-select-trigger')
      const grokModels = [
        { label: 'Fast', sublabel: 'Quick responses' },
        { label: 'Auto', sublabel: 'Chooses Fast or Expert' },
        { label: 'Expert', sublabel: 'Thinks hard' },
        { label: 'Heavy', sublabel: 'Team of Experts' },
      ]
      let selectedGrokModel = 'Fast'

      document.addEventListener('input', (event) => {
        if (event.target.matches('[aria-label="Ask Grok anything"]')) updateSubmitState()
      })

      document.addEventListener('keydown', (event) => {
        if (
          event.target instanceof Element &&
          event.target.matches('[aria-label="Ask Grok anything"]') &&
          event.key === 'Enter' &&
          !event.shiftKey
        ) {
          event.preventDefault()
          form.requestSubmit()
        }
        if (event.key === 'Escape') dismissGrokModelMenu()
      })

      modelTrigger.addEventListener('click', () => {
        if (modelTrigger.getAttribute('aria-expanded') === 'true') {
          dismissGrokModelMenu()
        } else {
          createGrokModelMenu()
        }
      })

      function createGrokModelMenu() {
        dismissGrokModelMenu()
        modelTrigger.setAttribute('aria-expanded', 'true')
        const menu = document.createElement('div')
        menu.setAttribute('role', 'menu')
        menu.dataset.fixture = 'grok-model-menu'
        const enabled = new Set(Array.isArray(globalThis.__fixtureGrokEnabledModels)
          ? globalThis.__fixtureGrokEnabledModels
          : grokModels.map((model) => model.label))
        for (const model of grokModels) {
          const item = document.createElement('div')
          item.setAttribute('role', 'menuitem')
          item.setAttribute('data-radix-collection-item', '')
          item.setAttribute('aria-disabled', String(!enabled.has(model.label)))
          const label = document.createElement('span')
          label.className = 'font-semibold text-sm'
          label.textContent = model.label
          const sublabel = document.createElement('span')
          sublabel.className = 'text-xs text-secondary'
          sublabel.textContent = model.sublabel
          item.append(label, sublabel)
          item.addEventListener('click', () => {
            if (item.getAttribute('aria-disabled') === 'true') return
            selectedGrokModel = model.label
            modelTrigger.textContent = selectedGrokModel
            dismissGrokModelMenu()
          })
          menu.append(item)
        }
        document.body.append(menu)
      }

      function dismissGrokModelMenu() {
        document.querySelector('[role="menu"][data-fixture="grok-model-menu"]')?.remove()
        modelTrigger.setAttribute('aria-expanded', 'false')
      }

      form.addEventListener('submit', (event) => {
        event.preventDefault()
        const input = composer()
        const prompt = textOf(input).trim()
        if (submit.disabled || !prompt) return

        conversation.append(createMessage('user', prompt))
        clearComposer(input)
        updateSubmitState()

        if (globalThis.__fixtureGrokAnonymousPaywall === true || Number.isFinite(globalThis.__fixtureGrokAnonymousPaywallDelayMs)) {
          const paywall = document.createElement('div')
          paywall.dataset.testid = 'anon-paywall-sign-up-card'
          paywall.innerHTML = '<strong>Continue your conversation</strong><p>Sign up for free to continue.</p>'
          const delayMs = globalThis.__fixtureGrokAnonymousPaywall === true
            ? 0
            : Math.max(0, globalThis.__fixtureGrokAnonymousPaywallDelayMs)
          setTimeout(() => document.body.append(paywall), delayMs)
          return
        }

        conversation.append(createMessage(
          'assistant',
          'visible Grok real-DOM fixture answer for: ' + prompt
        ))
        history.replaceState(null, '', '/c/123e4567-e89b-12d3-a456-426614174003')
      })

      function composer() {
        return document.querySelector('[aria-label="Ask Grok anything"]')
      }

      function updateSubmitState() {
        submit.disabled = textOf(composer()).trim().length === 0
      }

      function clearComposer(input) {
        if ('value' in input) {
          input.value = ''
        } else {
          input.textContent = ''
        }
      }

      function createMessage(role, text) {
        const message = document.createElement('div')
        message.dataset.testid = role + '-message'
        const markdown = document.createElement('div')
        markdown.className = 'response-content-markdown markdown'
        markdown.textContent = text
        message.append(markdown)
        return message
      }

      function textOf(node) {
        if (!node) return ''
        return 'value' in node ? node.value : (node.innerText || node.textContent || '')
      }
    </script>
  </body>
</html>
