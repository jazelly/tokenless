[package]
name = "tokenless-daemon"
version = "0.1.2"
edition = "2021"
description = "Local Tokenless control-plane daemon foundation backed by SQLite."
license = "MIT"

[lib]
name = "tokenless_daemon"
path = "src/lib.rs"

[[bin]]
name = "tokenless-daemon"
path = "src/main.rs"

[[bin]]
name = "tokenless-native-host"
path = "src/bin/tokenless-native-host.rs"

[dependencies]
axum = "0.7"
base64 = "0.22"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
clap = { version = "4.5", features = ["derive", "env"] }
fs2 = "0.4"
getrandom = "0.2"
hmac = "0.12"
libc = "0.2"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tokio = { version = "1", features = ["macros", "net", "rt-multi-thread"] }
tempfile = "3"
url = "2"
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
